<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitar Orçamento — Sync Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0A0F1E; --navy2:#0D1629;
      --glow:#00D4FF; --cyan:#4DE8F0;
      --white:#F0F8FF; --muted:#8AA3B8;
      --border:rgba(0,212,255,.18); --red:#FF4E6A;
    }
    body {
      background: var(--navy); color: var(--white); font-family:'Inter',sans-serif;
      min-height: 100vh; padding: 60px 20px; overflow-x: hidden;
    }
    canvas#network { position: fixed; inset: 0; width: 100%; height: 100%; opacity: .3; z-index: 1; }

    .wrap { max-width: 560px; margin: 0 auto; position: relative; z-index: 2; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none; font-size: .85rem;
      margin-bottom: 28px; transition: color .2s;
    }
    .back-link:hover { color: var(--glow); }

    .nav-logo {
      font-family:'Orbitron',sans-serif; font-weight:900; font-size:1rem; letter-spacing:.14em;
      color: var(--glow); text-shadow: 0 0 16px rgba(0,212,255,.4); margin-bottom: 10px;
      text-align: center;
    }
    .nav-logo span { color: var(--white); }

    h1 {
      font-family:'Orbitron',sans-serif; font-size: clamp(1.5rem, 5vw, 2.1rem);
      font-weight: 700; text-align: center; margin-bottom: 12px; line-height: 1.25;
    }
    h1 .accent {
      color: transparent; background: linear-gradient(135deg, var(--glow), var(--cyan));
      -webkit-background-clip: text; background-clip: text;
    }
    p.sub { color: var(--muted); font-size: .92rem; text-align: center; line-height: 1.6; margin-bottom: 40px; max-width: 420px; margin-left: auto; margin-right: auto; }

    .card { background: var(--navy2); border: 1px solid var(--border); border-radius: 16px; padding: 36px 30px; }

    .field { margin-bottom: 20px; text-align: left; }
    .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 8px; letter-spacing: .04em; }
    .field label .req { color: var(--glow); }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--navy); border: 1px solid var(--border); border-radius: 8px;
      padding: 13px 16px; color: var(--white); font-size: .92rem; font-family:'Inter',sans-serif;
      outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--glow); }
    .field textarea { resize: vertical; min-height: 100px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .budget-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 9px 16px; border-radius: 99px; border: 1px solid var(--border);
      font-size: .8rem; color: var(--muted); cursor: pointer; transition: all .2s; user-select: none;
    }
    .chip:hover { border-color: var(--glow); color: var(--glow); }
    .chip.active { background: linear-gradient(135deg, var(--glow), var(--cyan)); color: var(--navy); border-color: transparent; font-weight: 600; }

    .field-error { color: var(--red); font-size: .78rem; margin-top: 12px; display: none; }

    .btn-submit {
      width: 100%; background: linear-gradient(135deg, var(--glow), var(--cyan));
      color: var(--navy); font-weight: 700; padding: 16px; border-radius: 9px;
      border: none; cursor: pointer; font-family:'Orbitron',sans-serif; font-size: .82rem;
      letter-spacing: .08em; margin-top: 8px; transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 28px rgba(0,212,255,.22);
    }
    .btn-submit:hover { opacity: .9; transform: translateY(-2px); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    footer { text-align: center; margin-top: 28px; color: var(--muted); font-size: .75rem; }
    footer span { color: var(--glow); }

    @media (max-width: 480px) {
      .field-row { grid-template-columns: 1fr; }
      .card { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <canvas id="network"></canvas>

  <div class="wrap">
    <a href="index.html" class="back-link">← Voltar ao site</a>
    <div class="nav-logo">SYNC<span> CODE</span></div>
    <h1>Solicite seu <span class="accent">orçamento</span></h1>
    <p class="sub">Conta um pouco sobre seu projeto e te retorno em até 24h com uma proposta personalizada.</p>

    <div class="card">
      <form id="orcamento-form">
        <div class="field">
          <label>NOME COMPLETO <span class="req">*</span></label>
          <input type="text" id="f-nome" placeholder="Seu nome" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label>WHATSAPP <span class="req">*</span></label>
            <input type="tel" id="f-whatsapp" placeholder="(11) 99999-9999" required />
          </div>
          <div class="field">
            <label>E-MAIL</label>
            <input type="email" id="f-email" placeholder="seu@email.com" />
          </div>
        </div>

        <div class="field">
          <label>TIPO DE PROJETO <span class="req">*</span></label>
          <select id="f-tipo" required>
            <option value="">Selecione...</option>
            <option>Landing Page</option>
            <option>Sistema Web / SaaS</option>
            <option>E-commerce</option>
            <option>Painel Administrativo</option>
            <option>Sistema para meu negócio (loja, clínica, etc)</option>
            <option>Outro</option>
          </select>
        </div>

        <div class="field">
          <label>FAIXA DE INVESTIMENTO</label>
          <div class="budget-chips" id="budget-chips">
            <div class="chip" data-val="Até R$500">Até R$500</div>
            <div class="chip" data-val="R$500 - R$1.500">R$500 – R$1.500</div>
            <div class="chip" data-val="R$1.500 - R$3.000">R$1.500 – R$3.000</div>
            <div class="chip" data-val="Acima de R$3.000">Acima de R$3.000</div>
            <div class="chip" data-val="Ainda não sei">Ainda não sei</div>
          </div>
        </div>

        <div class="field">
          <label>CONTE SOBRE SEU PROJETO <span class="req">*</span></label>
          <textarea id="f-descricao" placeholder="O que você precisa, prazo desejado, referências..." required></textarea>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">ENVIAR SOLICITAÇÃO</button>
        <div class="field-error" id="form-error">Preencha os campos obrigatórios.</div>
      </form>
    </div>

    <footer>© 2026 <span>Sync Code</span> — Software & Development</footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCb2ACduDB-zZCaNczUk8bXZPiqq2HH9K4",
      authDomain: "sync-code-8cdfe.firebaseapp.com",
      projectId: "sync-code-8cdfe",
      storageBucket: "sync-code-8cdfe.firebasestorage.app",
      messagingSenderId: "884067837434",
      appId: "1:884067837434:web:df8b0044c2daecdb16f043",
      measurementId: "G-Y1XW9ELD5M"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let selectedBudget = '';
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        selectedBudget = chip.dataset.val;
      });
    });

    document.getElementById('orcamento-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome      = document.getElementById('f-nome').value.trim();
      const whatsapp  = document.getElementById('f-whatsapp').value.trim();
      const email     = document.getElementById('f-email').value.trim();
      const tipo      = document.getElementById('f-tipo').value;
      const descricao = document.getElementById('f-descricao').value.trim();
      const errEl     = document.getElementById('form-error');
      const btn       = document.getElementById('btn-submit');

      if (!nome || !whatsapp || !tipo || !descricao) {
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'ENVIANDO...';

      try {
        await addDoc(collection(db, 'orcamentos'), {
          nome, whatsapp, email, tipo,
          orcamento: selectedBudget,
          descricao,
          status: 'novo',
          createdAt: serverTimestamp()
        });

        window.location.href = 'obrigado.html';
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'ENVIAR SOLICITAÇÃO';
        errEl.textContent = 'Erro ao enviar. Tenta de novo em instantes.';
        errEl.style.display = 'block';
      }
    });
  </script>

  <script>
  (function(){
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let W, H, nodes = [];
    function resize(){ W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
    function init(){ nodes = []; const c = Math.floor((W*H)/16000); for(let i=0;i<c;i++) nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1.2}); }
    function draw(){
      ctx.clearRect(0,0,W,H);
      for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){ ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.strokeStyle=`rgba(0,212,255,${(1-d/130)*.3})`; ctx.lineWidth=.7; ctx.stroke(); }
      }
      nodes.forEach(n=>{ ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fillStyle='rgba(77,232,240,.6)'; ctx.fill(); n.x+=n.vx; n.y+=n.vy; if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1; });
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize',()=>{resize();init();});
    resize(); init(); draw();
  })();
  </script>
</body>
</html>
