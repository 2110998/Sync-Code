<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync Code — Painel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0A0F1E; --navy2:#0D1629; --navy3:#111827;
      --glow:#00D4FF; --cyan:#4DE8F0;
      --white:#F0F8FF; --muted:#8AA3B8;
      --border:rgba(0,212,255,.18); --red:#FF4E6A; --green:#00E5A0;
    }
    body { background:var(--navy); color:var(--white); font-family:'Inter',sans-serif; min-height:100vh; }

    /* LOGIN */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-box { background:var(--navy2); border:1px solid var(--border); border-radius:16px; padding:48px 40px; width:100%; max-width:400px; text-align:center; }
    .login-logo { font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:900; color:var(--glow); text-shadow:0 0 18px rgba(0,212,255,.4); margin-bottom:8px; }
    .login-sub { color:var(--muted); font-size:.8rem; margin-bottom:36px; letter-spacing:.06em; }
    .field { margin-bottom:18px; text-align:left; }
    .field label { display:block; font-size:.75rem; color:var(--muted); margin-bottom:7px; letter-spacing:.06em; }
    .field input, .field textarea, .field select {
      width:100%; background:var(--navy); border:1px solid var(--border); border-radius:7px;
      padding:11px 15px; color:var(--white); font-size:.9rem; font-family:'Inter',sans-serif;
      outline:none; transition:border-color .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--glow); }
    .field textarea { resize:vertical; min-height:90px; }
    .btn-full { width:100%; background:linear-gradient(135deg,var(--glow),var(--cyan)); color:var(--navy); font-weight:700; padding:13px; border-radius:7px; border:none; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:.78rem; letter-spacing:.1em; transition:opacity .2s; margin-top:8px; }
    .btn-full:hover { opacity:.88; }
    .login-err { color:var(--red); font-size:.8rem; margin-top:12px; }

    /* DASHBOARD */
    #dashboard { display:none; }
    header { background:var(--navy2); border-bottom:1px solid var(--border); padding:16px 36px; display:flex; align-items:center; justify-content:space-between; }
    .hdr-logo { font-family:'Orbitron',sans-serif; font-weight:900; color:var(--glow); font-size:1rem; }
    .hdr-logo span { color:var(--white); }
    .hdr-user { display:flex; align-items:center; gap:14px; }
    .hdr-email { font-size:.78rem; color:var(--muted); }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:5px; font-size:.75rem; cursor:pointer; transition:border-color .2s, color .2s; }
    .btn-logout:hover { border-color:var(--red); color:var(--red); }

    main { max-width:1100px; margin:0 auto; padding:40px 24px 80px; }
    .page-title { font-family:'Orbitron',sans-serif; font-size:1.5rem; font-weight:700; margin-bottom:32px; }
    .page-title span { color:var(--glow); }

    /* FORM */
    .form-card { background:var(--navy2); border:1px solid var(--border); border-radius:14px; padding:32px 36px; margin-bottom:48px; }
    .form-card h3 { font-family:'Orbitron',sans-serif; font-size:.95rem; font-weight:700; margin-bottom:24px; color:var(--cyan); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .form-grid .span2 { grid-column:span 2; }
    .form-actions { display:flex; gap:12px; margin-top:24px; align-items:center; flex-wrap:wrap; }
    .btn-save { background:linear-gradient(135deg,var(--glow),var(--cyan)); color:var(--navy); font-weight:700; padding:11px 28px; border-radius:7px; border:none; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:.74rem; letter-spacing:.1em; transition:opacity .2s; }
    .btn-save:hover { opacity:.88; }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; }
    .btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); padding:11px 24px; border-radius:7px; font-size:.85rem; cursor:pointer; transition:border-color .2s, color .2s; }
    .btn-cancel:hover { border-color:var(--muted); color:var(--white); }

    /* UPLOAD AREA */
    .upload-area {
      border:2px dashed var(--border); border-radius:10px;
      padding:24px; text-align:center; cursor:pointer;
      transition:border-color .2s, background .2s;
      position:relative; min-height:100px;
    }
    .upload-area:hover, .upload-area.drag { border-color:var(--glow); background:rgba(0,212,255,.04); }
    .upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-icon { font-size:2rem; margin-bottom:8px; }
    .upload-label { font-size:.82rem; color:var(--muted); }
    .upload-label strong { color:var(--glow); }

    /* PREVIEW IMAGES */
    .preview-list { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .preview-item { position:relative; width:80px; height:60px; border-radius:6px; overflow:hidden; border:1px solid var(--border); }
    .preview-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .preview-remove { position:absolute; top:2px; right:2px; background:rgba(255,78,106,.85); border:none; color:#fff; width:18px; height:18px; border-radius:50%; font-size:.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
    .upload-progress { font-size:.78rem; color:var(--cyan); margin-top:10px; }

    /* TOAST */
    .toast { position:fixed; bottom:28px; right:28px; z-index:999; background:var(--navy2); border:1px solid var(--green); color:var(--green); padding:14px 22px; border-radius:9px; font-size:.85rem; font-weight:500; display:none; box-shadow:0 8px 32px rgba(0,229,160,.18); }
    .toast.err { border-color:var(--red); color:var(--red); }
    .toast.show { display:block; }

    /* TABLE */
    .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .list-header h3 { font-family:'Orbitron',sans-serif; font-size:.95rem; color:var(--cyan); }
    .proj-table { width:100%; border-collapse:collapse; }
    .proj-table th { font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600; text-align:left; padding:0 16px 14px; }
    .proj-table td { padding:14px 16px; border-top:1px solid var(--border); font-size:.88rem; vertical-align:middle; }
    .proj-table tr:hover td { background:rgba(0,212,255,.04); }
    .proj-thumb { width:52px; height:38px; border-radius:5px; object-fit:cover; }
    .proj-thumb-empty { width:52px; height:38px; border-radius:5px; background:var(--navy3); display:flex; align-items:center; justify-content:center; font-size:1.1rem; opacity:.5; }
    .badge { font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; padding:3px 10px; border-radius:99px; background:rgba(0,212,255,.1); color:var(--glow); border:1px solid var(--border); }
    .tbl-actions { display:flex; gap:8px; }
    .btn-edit, .btn-del { padding:5px 12px; border-radius:5px; font-size:.73rem; cursor:pointer; border:1px solid; font-family:'Inter',sans-serif; transition:all .2s; }
    .btn-edit { border-color:var(--border); color:var(--muted); background:transparent; }
    .btn-edit:hover { border-color:var(--glow); color:var(--glow); }
    .btn-del { border-color:transparent; color:var(--red); background:rgba(255,78,106,.08); }
    .btn-del:hover { background:rgba(255,78,106,.18); }
    .empty-state { text-align:center; padding:48px; color:var(--muted); font-size:.9rem; }

    /* TABS */
    .tabs { display:flex; gap:8px; margin-bottom:32px; border-bottom:1px solid var(--border); }
    .tab-btn {
      background:transparent; border:none; color:var(--muted); padding:12px 4px; margin-right:24px;
      font-family:'Orbitron',sans-serif; font-size:.78rem; letter-spacing:.06em; cursor:pointer;
      border-bottom:2px solid transparent; transition:color .2s, border-color .2s; position:relative;
    }
    .tab-btn:hover { color:var(--white); }
    .tab-btn.active { color:var(--glow); border-color:var(--glow); }
    .tab-badge {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:18px; height:18px; padding:0 5px; border-radius:99px;
      background:var(--red); color:#fff; font-size:.62rem; font-weight:700;
      margin-left:6px; font-family:'Inter',sans-serif;
    }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ORCAMENTOS */
    .orc-grid { display:grid; gap:16px; }
    .orc-card {
      background:var(--navy2); border:1px solid var(--border); border-radius:12px;
      padding:22px 26px; position:relative;
    }
    .orc-card.is-new::before {
      content:'NOVO'; position:absolute; top:18px; right:22px;
      background:var(--glow); color:var(--navy); font-size:.62rem; font-weight:700;
      padding:3px 9px; border-radius:99px; letter-spacing:.06em; font-family:'Orbitron',sans-serif;
    }
    .orc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:16px; flex-wrap:wrap; }
    .orc-name { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; }
    .orc-date { font-size:.74rem; color:var(--muted); margin-top:3px; }
    .orc-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .orc-tag { font-size:.7rem; padding:4px 11px; border-radius:99px; border:1px solid var(--border); color:var(--cyan); background:rgba(0,212,255,.06); }
    .orc-desc { font-size:.85rem; color:var(--white); line-height:1.65; margin-bottom:18px; background:var(--navy); border-radius:8px; padding:14px 16px; border:1px solid var(--border); }
    .orc-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .orc-btn {
      display:inline-flex; align-items:center; gap:7px; text-decoration:none;
      padding:8px 16px; border-radius:7px; font-size:.78rem; font-weight:500; cursor:pointer;
      border:1px solid var(--border); color:var(--white); background:transparent; transition:all .2s;
    }
    .orc-btn.wpp:hover { border-color:#25D366; color:#25D366; }
    .orc-btn.mail:hover { border-color:#EA4335; color:#EA4335; }
    .orc-btn.done { border-color:var(--border); color:var(--muted); }
    .orc-btn.done:hover { border-color:var(--green); color:var(--green); }
    .orc-btn.del { color:var(--red); background:rgba(255,78,106,.08); border-color:transparent; }
    .orc-btn.del:hover { background:rgba(255,78,106,.18); }
    .orc-card.is-done { opacity:.55; }
    .orc-status-done { font-size:.7rem; color:var(--green); border:1px solid var(--green); padding:4px 10px; border-radius:99px; }

    @media(max-width:640px){
      .form-grid { grid-template-columns:1fr; }
      .form-grid .span2 { grid-column:span 1; }
      header { padding:14px 18px; }
      main { padding:24px 16px 60px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SYNC CODE</div>
    <div class="login-sub">PAINEL ADMINISTRATIVO</div>
    <div class="field"><label>E-MAIL</label><input type="email" id="inp-email" placeholder="admin@synccode.dev" /></div>
    <div class="field"><label>SENHA</label><input type="password" id="inp-pass" placeholder="••••••••" /></div>
    <button class="btn-full" id="btn-login">ENTRAR</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="hdr-logo">SYNC <span>CODE</span> <span style="color:var(--muted);font-size:.7rem;font-weight:400;letter-spacing:.14em;">ADMIN</span></div>
    <div class="hdr-user">
      <span class="hdr-email" id="hdr-email"></span>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </header>

  <main>
    <div class="page-title">Painel <span>Sync Code</span></div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-btn-projects">PROJETOS</button>
      <button class="tab-btn" id="tab-btn-orcamentos">ORÇAMENTOS <span class="tab-badge" id="orc-badge" style="display:none">0</span></button>
    </div>

    <!-- TAB: PROJETOS -->
    <div class="tab-panel active" id="tab-projects">
    <div class="form-card" id="form-card">
      <h3 id="form-title">+ Novo Projeto</h3>
      <input type="hidden" id="edit-id" />
      <div class="form-grid">
        <div class="field">
          <label>TÍTULO DO PROJETO</label>
          <input type="text" id="f-title" placeholder="Ex: Sistema de agendamento" />
        </div>
        <div class="field">
          <label>CATEGORIA</label>
          <select id="f-category">
            <option>SaaS</option><option>Landing Page</option><option>Sistema Web</option>
            <option>E-commerce</option><option>Dashboard</option><option>API</option><option>Outro</option>
          </select>
        </div>
        <div class="field span2">
          <label>DESCRIÇÃO</label>
          <textarea id="f-desc" placeholder="Descreva o projeto, tecnologias usadas, resultado..."></textarea>
        </div>
        <div class="field span2">
          <label>IMAGENS DO PROJETO (até 5)</label>
          <div class="upload-area" id="upload-area">
            <input type="file" id="f-files" accept="image/*" multiple />
            <div class="upload-icon">📁</div>
            <div class="upload-label">Clique ou arraste imagens aqui<br><strong>JPG, PNG, WEBP</strong> — até 5 fotos</div>
          </div>
          <div class="preview-list" id="preview-list"></div>
          <div class="upload-progress" id="upload-progress"></div>
        </div>
        <div class="field">
          <label>LINK DO PROJETO</label>
          <input type="url" id="f-link" placeholder="https://..." />
        </div>
        <div class="field">
          <label>ORDEM (número)</label>
          <input type="number" id="f-order" placeholder="1" value="1" min="1" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="btn-save">SALVAR PROJETO</button>
        <button class="btn-cancel" id="btn-cancel" style="display:none">Cancelar</button>
        <span id="saving-msg" style="font-size:.8rem;color:var(--muted);display:none">Fazendo upload das imagens...</span>
      </div>
    </div>

    <div class="list-header"><h3>Projetos cadastrados</h3></div>
    <div id="proj-list"><div class="empty-state">Carregando...</div></div>
    </div>

    <!-- TAB: ORÇAMENTOS -->
    <div class="tab-panel" id="tab-orcamentos">
      <div class="list-header"><h3>Pedidos de orçamento</h3></div>
      <div class="orc-grid" id="orc-list"><div class="empty-state">Carregando...</div></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, orderBy, query, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  // ── IMGBB (upload de imagens) ──
  // Pegue sua API Key gratuita em https://api.imgbb.com/
  const IMGBB_API_KEY = "70100a245a1b794ddb4f5fae534ff95b";
  const firebaseConfig = {
    apiKey: "AIzaSyCb2ACduDB-zZCaNczUk8bXZPiqq2HH9K4",
    authDomain: "sync-code-8cdfe.firebaseapp.com",
    projectId: "sync-code-8cdfe",
    storageBucket: "sync-code-8cdfe.firebasestorage.app",
    messagingSenderId: "884067837434",
    appId: "1:884067837434:web:df8b0044c2daecdb16f043",
    measurementId: "G-Y1XW9ELD5M"
  };

  const app     = initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const db      = getFirestore(app);

  // imagens pendentes (File objects) e URLs já salvas (edição)
  let pendingFiles = [];
  let savedUrls    = [];

  function showToast(msg, err=false){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (err?' err':'');
    setTimeout(()=>t.className='toast', 3500);
  }

  // AUTH
  onAuthStateChanged(auth, user => {
    if(user){
      document.getElementById('login-screen').style.display='none';
      document.getElementById('dashboard').style.display='block';
      document.getElementById('hdr-email').textContent=user.email;
      loadProjects();
      loadOrcamentos();
    } else {
      document.getElementById('login-screen').style.display='flex';
      document.getElementById('dashboard').style.display='none';
    }
  });

  document.getElementById('btn-login').addEventListener('click', async ()=>{
    const email = document.getElementById('inp-email').value.trim();
    const pass  = document.getElementById('inp-pass').value;
    document.getElementById('login-err').textContent='';
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e){ document.getElementById('login-err').textContent='E-mail ou senha incorretos.'; }
  });
  document.getElementById('inp-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('btn-login').click(); });
  document.getElementById('btn-logout').addEventListener('click', ()=>signOut(auth));

  // UPLOAD AREA
  const uploadArea = document.getElementById('upload-area');
  const filesInput = document.getElementById('f-files');

  uploadArea.addEventListener('dragover', e=>{ e.preventDefault(); uploadArea.classList.add('drag'); });
  uploadArea.addEventListener('dragleave', ()=>uploadArea.classList.remove('drag'));
  uploadArea.addEventListener('drop', e=>{ e.preventDefault(); uploadArea.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
  filesInput.addEventListener('change', ()=>handleFiles(filesInput.files));

  function handleFiles(fileList){
    const arr = Array.from(fileList);
    const total = pendingFiles.length + savedUrls.length;
    const allowed = Math.min(arr.length, 5 - total);
    if(allowed <= 0){ showToast('Máximo de 5 imagens por projeto.', true); return; }
    arr.slice(0, allowed).forEach(f => {
      pendingFiles.push(f);
      const reader = new FileReader();
      reader.onload = e => addPreview(e.target.result, 'pending', pendingFiles.length - 1);
      reader.readAsDataURL(f);
    });
    filesInput.value = '';
  }

  function addPreview(src, type, idx){
    const list = document.getElementById('preview-list');
    const item = document.createElement('div');
    item.className = 'preview-item';
    item.dataset.type = type;
    item.dataset.idx  = idx;
    item.innerHTML = `<img src="${src}" /><button class="preview-remove" title="Remover">×</button>`;
    item.querySelector('.preview-remove').addEventListener('click', ()=>removePreview(item, type, idx));
    list.appendChild(item);
  }

  function removePreview(item, type, idx){
    if(type === 'pending') pendingFiles.splice(idx, 1);
    else savedUrls.splice(idx, 1);
    item.remove();
    // re-index
    document.querySelectorAll('.preview-item').forEach((el, i) => el.dataset.idx = i);
  }

  function renderSavedPreviews(urls){
    const list = document.getElementById('preview-list');
    list.innerHTML = '';
    urls.forEach((url, i) => addPreview(url, 'saved', i));
  }

  // upload de UM arquivo pro ImgBB, retorna a URL direta da imagem
  async function uploadToImgBB(file){
    const formData = new FormData();
    formData.append('image', file);

    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if(!data.success) throw new Error(data.error?.message || 'Falha no upload da imagem');
    return data.data.url; // link direto da imagem
  }

  async function uploadPendingFiles(){
    const urls = [];
    for(let i=0; i<pendingFiles.length; i++){
      const url = await uploadToImgBB(pendingFiles[i]);
      urls.push(url);
    }
    return urls;
  }

  // SAVE
  document.getElementById('btn-save').addEventListener('click', async ()=>{
    const title    = document.getElementById('f-title').value.trim();
    const category = document.getElementById('f-category').value;
    const desc     = document.getElementById('f-desc').value.trim();
    const link     = document.getElementById('f-link').value.trim();
    const order    = parseInt(document.getElementById('f-order').value)||1;
    const editId   = document.getElementById('edit-id').value;

    if(!title||!desc){ showToast('Título e descrição são obrigatórios.', true); return; }

    const btn = document.getElementById('btn-save');
    const msg = document.getElementById('saving-msg');
    btn.disabled = true; msg.style.display='inline';

    try {
      const newUrls  = await uploadPendingFiles();
      const allImages = [...savedUrls, ...newUrls];

      const data = { title, category, description:desc, images:allImages, imageUrl:allImages[0]||'', link, order, updatedAt:serverTimestamp() };

      if(editId){
        await updateDoc(doc(db,'projects',editId), data);
        showToast('✅ Projeto atualizado!');
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(db,'projects'), data);
        showToast('✅ Projeto adicionado!');
      }
      resetForm();
      loadProjects();
    } catch(e){
      console.error(e);
      showToast('Erro ao salvar. Verifique sua API Key do ImgBB.', true);
    } finally {
      btn.disabled=false; msg.style.display='none';
    }
  });

  // LOAD
  async function loadProjects(){
    const container = document.getElementById('proj-list');
    try {
      const q    = query(collection(db,'projects'), orderBy('order','asc'));
      const snap = await getDocs(q);

      if(snap.empty){ container.innerHTML='<div class="empty-state">Nenhum projeto cadastrado. Crie o primeiro! 🚀</div>'; return; }

      let html = `<table class="proj-table"><thead><tr><th>Capa</th><th>Título</th><th>Categoria</th><th>Fotos</th><th>Link</th><th>Ações</th></tr></thead><tbody>`;
      snap.forEach(d=>{
        const p = d.data();
        const imgs = p.images||[];
        html += `<tr>
          <td>${imgs[0]?`<img class="proj-thumb" src="${imgs[0]}" />`:'<div class="proj-thumb-empty">⚡</div>'}</td>
          <td><strong>${p.title}</strong></td>
          <td><span class="badge">${p.category}</span></td>
          <td style="color:var(--muted);font-size:.8rem;">${imgs.length} foto${imgs.length!==1?'s':''}</td>
          <td>${p.link?`<a href="${p.link}" target="_blank" style="color:var(--glow);font-size:.8rem;">${p.link.replace('https://','').slice(0,28)}…</a>`:'—'}</td>
          <td><div class="tbl-actions">
            <button class="btn-edit" onclick="editProject('${d.id}')">Editar</button>
            <button class="btn-del" onclick="deleteProject('${d.id}')">Excluir</button>
          </div></td>
        </tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;

      window._projects = {};
      snap.forEach(d => window._projects[d.id] = d.data());
    } catch(e){
      console.error(e);
      container.innerHTML='<div class="empty-state">Erro ao carregar. Verifique as permissões do Firebase.</div>';
    }
  }

  // EDIT
  window.editProject = function(id){
    const p = window._projects[id]; if(!p) return;
    document.getElementById('edit-id').value    = id;
    document.getElementById('f-title').value    = p.title||'';
    document.getElementById('f-category').value = p.category||'SaaS';
    document.getElementById('f-desc').value     = p.description||'';
    document.getElementById('f-link').value     = p.link||'';
    document.getElementById('f-order').value    = p.order||1;
    savedUrls    = p.images||[];
    pendingFiles = [];
    renderSavedPreviews(savedUrls);
    document.getElementById('form-title').textContent='✏️ Editando projeto';
    document.getElementById('btn-cancel').style.display='inline-block';
    document.getElementById('form-card').scrollIntoView({behavior:'smooth'});
  };

  // DELETE
  window.deleteProject = async function(id){
    if(!confirm('Excluir este projeto? Não dá pra desfazer.')) return;
    try { await deleteDoc(doc(db,'projects',id)); showToast('🗑️ Projeto excluído.'); loadProjects(); }
    catch(e){ showToast('Erro ao excluir.',true); }
  };

  document.getElementById('btn-cancel').addEventListener('click', resetForm);

  // TABS
  document.getElementById('tab-btn-projects').addEventListener('click', () => switchTab('projects'));
  document.getElementById('tab-btn-orcamentos').addEventListener('click', () => switchTab('orcamentos'));

  function switchTab(name){
    document.getElementById('tab-projects').classList.toggle('active', name==='projects');
    document.getElementById('tab-orcamentos').classList.toggle('active', name==='orcamentos');
    document.getElementById('tab-btn-projects').classList.toggle('active', name==='projects');
    document.getElementById('tab-btn-orcamentos').classList.toggle('active', name==='orcamentos');
  }

  // ── ORÇAMENTOS ──
  function formatDate(ts){
    if(!ts || !ts.toDate) return '';
    const d = ts.toDate();
    return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' }) + ' às ' +
           d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  function whatsappLink(phone, nome){
    const digits = (phone||'').replace(/\D/g,'');
    const withCountry = digits.startsWith('55') ? digits : '55' + digits;
    const msg = encodeURIComponent(`Oi ${nome ? nome.split(' ')[0] : ''}! Vi sua solicitação de orçamento na Sync Code, vamos conversar sobre seu projeto?`);
    return `https://wa.me/${withCountry}?text=${msg}`;
  }

  async function loadOrcamentos(){
    const container = document.getElementById('orc-list');
    try {
      const q    = query(collection(db, 'orcamentos'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);

      if(snap.empty){
        container.innerHTML = '<div class="empty-state">Nenhum pedido de orçamento ainda.</div>';
        document.getElementById('orc-badge').style.display = 'none';
        return;
      }

      let novos = 0;
      let html = '';
      window._orcamentos = {};

      snap.forEach(d => {
        const o = d.data();
        window._orcamentos[d.id] = o;
        const isDone = o.status === 'concluido';
        const isNew  = o.status === 'novo' || !o.status;
        if(isNew) novos++;

        html += `<div class="orc-card ${isNew ? 'is-new' : ''} ${isDone ? 'is-done' : ''}">
          <div class="orc-top">
            <div>
              <div class="orc-name">${o.nome || 'Sem nome'}</div>
              <div class="orc-date">${formatDate(o.createdAt)}</div>
            </div>
            ${isDone ? '<span class="orc-status-done">✓ Atendido</span>' : ''}
          </div>
          <div class="orc-tags">
            <span class="orc-tag">${o.tipo || '—'}</span>
            ${o.orcamento ? `<span class="orc-tag">💰 ${o.orcamento}</span>` : ''}
            <span class="orc-tag">📱 ${o.whatsapp || '—'}</span>
            ${o.email ? `<span class="orc-tag">✉️ ${o.email}</span>` : ''}
          </div>
          <div class="orc-desc">${o.descricao || ''}</div>
          <div class="orc-actions">
            <a class="orc-btn wpp" href="${whatsappLink(o.whatsapp, o.nome)}" target="_blank">💬 Chamar no WhatsApp</a>
            ${o.email ? `<a class="orc-btn mail" href="mailto:${o.email}">✉️ Responder e-mail</a>` : ''}
            ${!isDone ? `<button class="orc-btn done" onclick="markDone('${d.id}')">✓ Marcar como atendido</button>` : ''}
            <button class="orc-btn del" onclick="deleteOrcamento('${d.id}')">Excluir</button>
          </div>
        </div>`;
      });

      container.innerHTML = html;
      const badge = document.getElementById('orc-badge');
      if(novos > 0){ badge.style.display = 'inline-flex'; badge.textContent = novos; }
      else badge.style.display = 'none';

    } catch(e){
      console.error(e);
      container.innerHTML = '<div class="empty-state">Erro ao carregar orçamentos. Verifique as permissões do Firebase.</div>';
    }
  }

  window.markDone = async function(id){
    try {
      await updateDoc(doc(db, 'orcamentos', id), { status: 'concluido' });
      showToast('✅ Marcado como atendido!');
      loadOrcamentos();
    } catch(e){ showToast('Erro ao atualizar.', true); }
  };

  window.deleteOrcamento = async function(id){
    if(!confirm('Excluir este pedido de orçamento?')) return;
    try {
      await deleteDoc(doc(db, 'orcamentos', id));
      showToast('🗑️ Pedido excluído.');
      loadOrcamentos();
    } catch(e){ showToast('Erro ao excluir.', true); }
  };

  function resetForm(){
    document.getElementById('edit-id').value='';
    document.getElementById('f-title').value='';
    document.getElementById('f-category').value='SaaS';
    document.getElementById('f-desc').value='';
    document.getElementById('f-link').value='';
    document.getElementById('f-order').value='1';
    document.getElementById('preview-list').innerHTML='';
    document.getElementById('upload-progress').textContent='';
    pendingFiles=[]; savedUrls=[];
    document.getElementById('form-title').textContent='+ Novo Projeto';
    document.getElementById('btn-cancel').style.display='none';
  }
</script>
</body>
</html>
